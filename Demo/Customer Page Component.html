<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Page</title>
  <style>
    /* Root Theme Variables */
    :root {
      --background: #ffffff;
      --foreground: #3a3a3a;
      --card: #ffffff;
      --card-foreground: #3a3a3a;
      --accent: #1ABC9C;
      --accent-foreground: #3a3a3a;
      --secondary: #f4f4f4;
      --secondary-foreground: #333;
      --muted: #f4f4f4;
      --muted-foreground: #767676;
      --border: #e5e5e5;
      --radius: 8px;
    }

    /* Dark Mode Variables */
    .dark {
      --background: #3a3a3a;
      --foreground: #ffffff;
      --card: #3a3a3a;
      --card-foreground: #ffffff;
      --accent: #242424;
      --accent-foreground: #ffffff;
      --secondary: #2e2e2e;
      --muted: #2e2e2e;
      --muted-foreground: #a3a3a3;
      --border: #2e2e2e;
    }

    /* Global Styles */
    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .min-h-screen {
      min-height: 100vh;
    }

    header {
      background-color: var(--accent);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .text-white {
      color: var(--foreground);
      font-weight: bold;
    }

    header input[type="text"] {
      padding: 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    header button {
      margin-left: 8px;
      background-color: var(--secondary);
      color: var(--secondary-foreground);
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
    }

    header button:hover {
      background-color: #d6d6d6;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
    }

    h1 {
      font-size: 32px;
      color: var(--muted-foreground);
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 32px;
      width: 100%;
      max-width: 1200px;
      padding: 0 16px;
    }

    .grid > div {
      background-color: var(--muted);
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      text-align: center;
    }

    .grid span {
      color: var(--muted-foreground);
      font-size: 16px;
    }

    .grid span + span {
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="min-h-screen">
    <header>
      <div class="text-white">LOGO</div>
      <div>
        <input type="text" placeholder="Search store here..">
        <button>Login</button>
      </div>
    </header>
    <main>
      <h1>Customer Page</h1>
      <div class="grid">
        <div>
          <span>Store-1</span>
          <span>&rarr;</span>
        </div>
        <div>
          <span>Store-2</span>
          <span>&rarr;</span>
        </div>
        <div>
          <span>Store-3</span>
          <span>&rarr;</span>
        </div>
        <div>
          <span>Store-4</span>
          <span>&rarr;</span>
        </div>
        <div>
          <span>Store-5</span>
          <span>&rarr;</span>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
